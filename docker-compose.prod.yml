services:
  web:
    ports: !reset []
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2.8.4-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
